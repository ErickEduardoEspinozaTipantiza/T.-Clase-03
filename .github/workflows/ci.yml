name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'bugfix/**', 'tech-debt/**']
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: epn-event-manager

jobs:
  quality-gate:
    name: Lint → Build → Tests → Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: epn-event-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Tests with coverage gate (≥80% business logic)
        run: npm run test:cov
